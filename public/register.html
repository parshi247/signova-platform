<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Signova Platform</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Signova Platform</h1>
        <nav>
            <a href="/">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <h2>Register New Account</h2>
        <form id="registerForm">
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <p id="message"></p>
    </main>
    <footer>
        <p>&copy; 2025 Signova Platform. Managed by Manus AI.</p>
    </footer>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageElement = document.getElementById('message');

            try {
                const response = await fetch('http://159.223.172.234/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    messageElement.textContent = data.message || 'Registration successful! You can now login.';
                    messageElement.style.color = 'green';
                    // Optionally redirect to login page or dashboard
                    // window.location.href = 'login.html';
                } else {
                    messageElement.textContent = data.error || 'Registration failed. Please try again.';
                    messageElement.style.color = 'red';
                }
            } catch (error) {
                console.error('Error:', error);
                messageElement.textContent = 'An error occurred. Please try again later.';
                messageElement.style.color = 'red';
            }
        });
    </script>
</body>
</html>
